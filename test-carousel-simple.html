<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮播测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; }
        
        .banner-slider {
            position: relative;
            width: 100%;
            max-width: 750px;
            height: 300px;
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #333;
        }
        
        .banner-slides {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
        }
        
        .banner-slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }
        
        .banner-slide:nth-child(1) { background-color: #E53935; }
        .banner-slide:nth-child(2) { background-color: #43A047; }
        .banner-slide:nth-child(3) { background-color: #1E88E5; }
        
        .banner-slide span {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 48px;
            color: white;
        }
        
        /* 前进后退按钮 */
        .banner-control {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
        }
        .banner-control.prev { left: 10px; }
        .banner-control.next { right: 10px; }
        .banner-control:hover { background: rgba(0,0,0,0.8); }
        
        /* 指示器 */
        .banner-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .banner-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .banner-dot.active { background: white; }
        
        .info {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>轮播测试页面</h1>
        <p>应该每3秒自动切换，点击按钮或圆点也可以切换</p>
    </div>
    
    <div class="banner-slider">
        <div class="banner-slides" id="bannerSlides">
            <div class="banner-slide"><span>第1张图 - 红色</span></div>
            <div class="banner-slide"><span>第2张图 - 绿色</span></div>
            <div class="banner-slide"><span>第3张图 - 蓝色</span></div>
        </div>
        <button class="banner-control prev" onclick="prevSlide()">‹</button>
        <button class="banner-control next" onclick="nextSlide()">›</button>
        <div class="banner-dots" id="bannerDots">
            <div class="banner-dot active" onclick="goToSlide(0)"></div>
            <div class="banner-dot" onclick="goToSlide(1)"></div>
            <div class="banner-dot" onclick="goToSlide(2)"></div>
        </div>
    </div>
    
    <script>
        let currentSlide = 0;
        let slideInterval = null;
        const totalSlides = 3;
        
        function goToSlide(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;
            currentSlide = index;
            
            const slides = document.getElementById('bannerSlides');
            const dots = document.querySelectorAll('.banner-dot');
            
            slides.style.transform = `translateX(-${index * 100}%)`;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }
        
        function nextSlide() {
            goToSlide((currentSlide + 1) % totalSlides);
        }
        
        function prevSlide() {
            goToSlide((currentSlide - 1 + totalSlides) % totalSlides);
        }
        
        function startAutoSlide() {
            goToSlide(0);
            slideInterval = setInterval(nextSlide, 3000);
            console.log('轮播已启动');
        }
        
        // 启动轮播
        startAutoSlide();
    </script>
</body>
</html>
